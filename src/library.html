<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: whitesmoke;
            color: black;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            border-bottom: 2px solid lightgray;
            padding-bottom: 10px;
            font-size: 1.5rem;
            word-break: break-all;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid silver;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .explorer-list {
            background-color: white;
            border: 1px solid silver;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid gainsboro;
            text-decoration: none;
            color: black;
            cursor: pointer;
            user-select: none;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background-color: whitesmoke;
        }

        .list-item.folder {
            font-weight: bold;
        }

        .icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .empty {
            color: gray;
            font-style: italic;
            cursor: default;
        }

        .empty:hover {
            background-color: white;
        }
    </style>
</head>

<body>
    <div id="root" class="container"></div>
    <script type="module" src="./library.tsx"></script>
</body>

</html>
