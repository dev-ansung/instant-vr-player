<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: whitesmoke;
            color: black;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .header {
            border-bottom: 2px solid lightgray;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
        }

        .breadcrumbs {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .breadcrumbs button {
            background: none;
            border: none;
            color: #0066cc;
            cursor: pointer;
            padding: 0;
            font-size: inherit;
        }

        .breadcrumbs button:hover {
            text-decoration: underline;
        }

        .separator {
            color: gray;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: white;
            border: 1px solid silver;
            border-radius: 4px;
            text-decoration: none;
            color: black;
            font-size: 16px;
            transition: border-color 0.2s;
            cursor: pointer;
            text-align: left;
        }

        .list-item:hover {
            border-color: gray;
            background-color: wheat;
        }

        .list-item.folder {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="root" class="container"></div>
    <script type="module" src="./library.tsx"></script>
</body>

</html>
