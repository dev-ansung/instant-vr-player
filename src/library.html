<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Library</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: whitesmoke;
            color: black;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .video-card {
            display: block;
            padding: 20px;
            background-color: white;
            border: 1px solid silver;
            border-radius: 4px;
            text-decoration: none;
            color: black;
            transition: border-color 0.2s;
        }

        .video-card:hover {
            border-color: gray;
        }

        .video-card span {
            display: block;
            font-size: small;
            color: gray;
            margin-top: 8px;
        }

        h1 {
            border-bottom: 2px solid lightgray;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>
    <div id="root" class="container"></div>
    <script type="module" src="./library.tsx"></script>
</body>

</html>
