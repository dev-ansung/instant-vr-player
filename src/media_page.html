<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://cdn.jsdelivr.net/npm/video.js@7/dist/video-js.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@blaineam/videojs-vr@3.1.4/dist/videojs-vr.css" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            background-color: black;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px 20px;
            background-color: #1a1a1a;
            border-bottom: 1px solid dimery;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            color: silver;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid gray;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .back-link:hover {
            color: white;
            border-color: white;
        }

        .video-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }

        #video-title {
            margin: 0;
            font-size: 18px;
            color: whitesmoke;
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="back-link">← Back to Library</a>
    </header>

    <div class="video-container">
        <video id="videojs-vr-player" class="video-js vjs-default-skin" controls playsinline>
        </video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/video.js@7/dist/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@blaineam/videojs-vr@3.1.4/dist/videojs-vr.js"></script>
    <script type="module" src="./media_page.tsx"></script>
</body>

</html>
